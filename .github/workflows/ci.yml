name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linting tools
        run: pip install black isort flake8 ruff

      - name: black
        run: black --check src/ tests/

      - name: isort
        run: isort --check-only src/ tests/

      - name: flake8
        run: flake8 src/ tests/

      - name: ruff
        run: ruff check src/ tests/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taskmanager
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Create test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c \
            "CREATE DATABASE taskmanager_test;"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/taskmanager
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/taskmanager_test
          SECRET_KEY: ci-secret-key-for-testing-only
        run: pytest --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: false
          tags: task-manager:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
