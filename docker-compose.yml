# ─── Development compose ─────────────────────────────────────────────────────
# Usage:
#   cp .env.example .env        # first time only
#   docker compose up --build
#
# Hot-reload is enabled; source code is mounted as a volume.
# All configuration is read from .env — edit that file, not this one.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: >
      uvicorn src.infrastructure.api.main:app
      --host 0.0.0.0 --port ${APP_PORT:-8000} --reload
    volumes:
      - .:/app
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/init_test_db.sql:/docker-entrypoint-initdb.d/init_test_db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_dev_data:
